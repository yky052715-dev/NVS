experiment:
  output_dir: outputs/nvs/detection_dev5
  seed: 42

data:
  categories: [bottle, metal_nut, grid, leather, screw]
  input_size: 518
  calibration_fraction: 0.20
  threshold_fit_fraction: 0.80
  num_workers: 4

model:
  name: dinov2_vits14
  hub_dir: null
  batch_size: 4

memory:
  max_bank_size: 30000
  query_chunk_size: 4096
  bank_chunk_size: 8192

calibration:
  mad_epsilon: 1.0e-6
  threshold_method: image_max_quantile
  image_quantile: 0.95

metrics:
  small_defect_area_fraction: 0.01

subspace:
  nvs_rank: 32
  feature_pca_rank: 16
  max_delta_samples: 100000
  max_feature_samples: 100000

fusion:
  enabled: true
  # score = alpha * R0_normalized + (1 - alpha) * R2_normalized
  alphas: [0.25, 0.50, 0.75]

transforms:
  - {name: brightness, value: -30}
  - {name: brightness, value: -15}
  - {name: brightness, value: 15}
  - {name: brightness, value: 30}
  - {name: contrast, value: 0.75}
  - {name: contrast, value: 0.90}
  - {name: contrast, value: 1.10}
  - {name: contrast, value: 1.25}
  - {name: blur, value: 0.5}
  - {name: blur, value: 1.0}
  - {name: blur, value: 1.5}
  - {name: noise, value: 1}
  - {name: noise, value: 3}
  - {name: noise, value: 5}
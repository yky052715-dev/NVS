experiment:
  output_dir: outputs/nvs/e1_transform_fp_dev5
  seed: 42

data:
  categories: [bottle, metal_nut, grid, leather, screw]
  input_size: 518
  calibration_fraction: 0.20
  threshold_fit_fraction: 0.80
  num_workers: 4

model:
  name: dinov2_vits14
  hub_dir: null
  batch_size: 4

memory:
  max_bank_size: 30000
  query_chunk_size: 4096
  bank_chunk_size: 8192

calibration:
  mad_epsilon: 1.0e-6
  clamp_min_zero: true
  threshold_method: image_max_quantile
  image_quantile: 0.95
  image_score: topk_mean
  image_topk_fraction: 0.01

transforms:
  - {name: identity, value: 0}
  - {name: brightness, value: -30}
  - {name: brightness, value: -15}
  - {name: brightness, value: 15}
  - {name: brightness, value: 30}
  - {name: contrast, value: 0.75}
  - {name: contrast, value: 0.90}
  - {name: contrast, value: 1.10}
  - {name: contrast, value: 1.25}
  - {name: blur, value: 0.5}
  - {name: blur, value: 1.0}
  - {name: blur, value: 1.5}
  - {name: noise, value: 1}
  - {name: noise, value: 3}
  - {name: noise, value: 5}
  - {name: rotation, value: -20}
  - {name: rotation, value: -15}
  - {name: rotation, value: -10}
  - {name: rotation, value: -5}
  - {name: rotation, value: 5}
  - {name: rotation, value: 10}
  - {name: rotation, value: 15}
  - {name: rotation, value: 20}
  - {name: scale, value: 0.85}
  - {name: scale, value: 0.90}
  - {name: scale, value: 0.95}
  - {name: scale, value: 1.05}
  - {name: scale, value: 1.10}
  - {name: scale, value: 1.15}


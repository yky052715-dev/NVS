experiment:
  output_dir: outputs/conditional_nvs/sr_cnvs_gate1
  seed: 42
core_experiment:
  enabled: true
data:
  categories: [bottle, metal_nut, grid, leather, screw]
  input_size: 518
  calibration_fraction: 0.20
  nvs_fit_fraction_of_remainder: 0.30
  num_workers: 4
  perturbed_root: null
  require_perturbed_fit_transforms: true
model:
  name: dinov2_vits14
  hub_dir: null
  batch_size: 4
  gpu_batch_size: 16
memory:
  protocol: M_K10
  candidate_size: 50000
  query_chunk_size: 4096
  bank_chunk_size: 8192
  gpu_query_chunk_size: 16384
  gpu_bank_chunk_size: 32768
subspace:
  rank: 8
  prototypes: 128
  prototype_selection: proto_by_mstar
stability_regularization:
  enabled: true
  bootstrap_repeats: 5
  bootstrap_fraction: 0.80
  weight_epsilon: 1.0e-8
report_methods: [D0_NN, D2_NVSGlobal, D3_NVSProto, SR_CNVS]
calibration:
  mad_epsilon: 1.0e-6
  image_quantile: 0.95
metrics:
  small_defect_area_fraction: 0.01
whitening:
  mode: cosine
  rho: 0.99
  lambda: 0.07
  relative_floor: 1.0e-8
  max_components: null
fusion: {enabled: false}
postprocess: {enabled: false}
augmem: {enabled: false}
fit_transforms:
  - {name: brightness, value: -30}
  - {name: brightness, value: -15}
  - {name: brightness, value: 15}
  - {name: brightness, value: 30}
  - {name: contrast, value: 0.75}
  - {name: contrast, value: 0.90}
  - {name: contrast, value: 1.10}
  - {name: contrast, value: 1.25}
  - {name: blur, value: 0.5}
  - {name: blur, value: 1.0}
  - {name: blur, value: 1.5}
  - {name: noise, value: 1}
  - {name: noise, value: 3}